name: Publish Package

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@bbcd7f9ee60a2728e1f6f81e495b341973ffbce6 # v1
        with:
          node-version: lts/*
          cache: true
          registry-url: https://registry.npmjs.org

      - run: npm publish
